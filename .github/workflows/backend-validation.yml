name: Backend Validation Pipeline

on:
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "homehub-backend/**"
      - ".github/workflows/backend-validation.yml"

concurrency:
  group: backend-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-analyze:
    name: Build, Test, Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Build and run tests
        run: cd homehub-backend && mvn -B clean verify

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: homehub-backend/target/site/jacoco/

      - name: Run Checkstyle
        run: cd homehub-backend && mvn checkstyle:check

      - name: Run SpotBugs
        run: cd homehub-backend && mvn com.github.spotbugs:spotbugs-maven-plugin:check

      - name: Run OWASP Dependency Check
        run: cd homehub-backend && mvn org.owasp:dependency-check-maven:check

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: homehub-backend/target/dependency-check-report.html

      - name: Fail if reports missing
        run: |
          test -f homehub-backend/target/dependency-check-report.html