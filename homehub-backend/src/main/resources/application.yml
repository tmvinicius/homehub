h2:
  console:
    enabled: true

jwt:
  #mantendo como teste
  secret: my-Secret-Key-master-secret-test-hmac-12345
  expiration: 86400000

security:
  password:
    bcrypt:
      # 12 para producao, 8 para testes
      strength: 8

spring:
  application:
    name: home.hub
  datasource:
    url: jdbc:h2:file:./data/homehub-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080